<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roman Numeral Generator</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <main>
        <h1>Roman Numeral Generator</h1>
        <form id="form">
            <label for="input">Enter an integer between 1 and 3999 (inclusive):</label>
            <input type="number" id="input" name="input" min="1" max="3999" step="1" inputmode="numeric" aria-describedby="error" required />
            <p role="alert" id="error" class="error-message"></p>
            <button type="submit">Generate</button>
        </form>
        <output name="output" for="input" id="output" role="status"></output>
    </main>
    <script type="module">
        import { romanNumeralGenerator } from "./roman-numeral-generator.js";
    
        const form = document.getElementById("form");
        const inputElement = document.getElementById("input");
        const errorElement = document.getElementById("error");
        const outputElement = document.getElementById("output");

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            errorElement.style.display = "none";

            try {
                const result = romanNumeralGenerator(parseInt(inputElement.value, 10));
                outputElement.textContent = `Result: ${result}`;
            } catch (error) {
                outputElement.textContent = "";
                errorElement.textContent = error.message;
                errorElement.style.display = "block";
            }
        });
    </script>
  </body>
</html>
